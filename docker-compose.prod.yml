services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: tpot_digest
      POSTGRES_USER: ${DB_USER:-tpot}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-tpot}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "4"]
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-tpot}:${DB_PASSWORD}@db:5432/tpot_digest
      DATA_DIR: /app/data
      AUTH_USER: ${AUTH_USER}
      AUTH_PASS: ${AUTH_PASS}
      X_API_BEARER_TOKEN: ${X_API_BEARER_TOKEN}
      XAI_API_KEY: ${XAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ADMIN_SECRET: ${ADMIN_SECRET}
      RESEND_API_KEY: ${RESEND_API_KEY}
      DIGEST_FROM_EMAIL: ${DIGEST_FROM_EMAIL:-abridged tech <today@abridged.tech>}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
    volumes:
      - app_data:/app/data
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    depends_on:
      - backend

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    entrypoint: /scripts/caddy-entrypoint.sh
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      AUTH_USER: ${AUTH_USER:-admin}
      AUTH_PASS: ${AUTH_PASS:-changeme}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./scripts/caddy-entrypoint.sh:/scripts/caddy-entrypoint.sh
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - frontend

volumes:
  pgdata:
  app_data:
  caddy_data:
  caddy_config:
