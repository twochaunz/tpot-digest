services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: tpot_digest
      POSTGRES_USER: ${DB_USER:-tpot}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-tpot_dev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-tpot}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-tpot}:${DB_PASSWORD:-tpot_dev}@db:5432/tpot_digest
      DATA_DIR: /app/data
    volumes:
      - ./backend:/app
      - ./data:/app/data
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  pgdata:
